# ── Server ──────────────────────────────────────────────────────────────
server.port=8080

# ── Database ─────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/gurukulam_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────────────
# Replace this secret with a strong 256-bit base64 key in production
app.jwt.secret=Z2d1cnVrdWxhbVNjaG9vbEp3dFNlY3JldEtleUZvckd1cnVrdWxhbVNjaG9vbA==
app.jwt.expiration-ms=86400000

# ── File Upload ───────────────────────────────────────────────────────────
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ──────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.gurukulam=DEBUG
logging.level.org.springframework.security=INFO
