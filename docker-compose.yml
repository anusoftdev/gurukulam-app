version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    platform: linux/arm64
    container_name: gurukulam_postgres
    environment:
      POSTGRES_DB: gurukulam_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: gurukulam_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gurukulam_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: Z2d1cnVrdWxhbVNjaG9vbEp3dFNlY3JldEtleUZvckd1cnVrdWxhbVNjaG9vbA==
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: gurukulam_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  uploads: